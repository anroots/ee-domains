version: 2
updates:
  - package-ecosystem: "npm"
    directories:
      - "/"
    schedule:
      interval: "quarterly"
    open-pull-requests-limit: 10
    groups:
      actions-minor:
        update-types:
          - minor
          - patch
  - package-ecosystem: github-actions
    directories:
      - "/.github/workflows"
    schedule:
      interval: "quarterly"
    open-pull-requests-limit: 5
